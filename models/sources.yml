version: 2

sources:
  - name: google_drive
    database: LOAD
    schema: GOOGLE_DRIVE
    description: This source contains data from Google Drive.
    config:
      freshness:
        warn_after: {count: 1, period: day}
        error_after: {count: 5, period: day}
      loaded_at_field: '"_FIVETRAN_SYNCED"'
    
    tables:

      - name: EXPENSES
        description: This table contains expense records.
        config:
          freshness:
            warn_after: {count: 1, period: day}
            error_after: {count: 5, period: day}
          loaded_at_field: '"_FIVETRAN_SYNCED"'

      - name: HR_JOINS
        description: This table contains employee join records.


      - name: HR_QUITS
        description: This table contains employee quit records.


      - name: RETURNS
        description: This table contains order return records.

      
  - name: web_schema
    database: LOAD
    schema: WEB_SCHEMA
    description: This source contains web activity data.
    config:
      freshness:
        warn_after: {count: 1, period: day}
        error_after: {count: 5, period: day}
      # loaded_at_field: '"_FIVETRAN_SYNCED"'
    tables:
      
      - name: SESSIONS
        description: This table contains website session records.
        config:
          freshness:
            warn_after: {count: 1, period: day}
            error_after: {count: 5, period: day}

      - name: ORDERS
        description: This table contains website order records.


      - name: PAGE_VIEWS
        description: This table contains website page view records.


      - name: ITEM_VIEWS
        description: This table contains website item view records.
