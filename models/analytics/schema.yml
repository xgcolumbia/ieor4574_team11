models:

  - name: dim_employee
    description: This table contains employee information.
    columns:
      - name: employee_id
        description: This is the unique id of the employee.
        tests:
          - unique
          - not_null

      - name: hire_date
        description: This is the hire date of the employee.

      - name: name
        description: This is the name of the employee.

      - name: city
        description: This is the city of the employee.

      - name: address
        description: This is the address of the employee.

      - name: title
        description: This is the job title of the employee.

      - name: annual_salary
        description: This is the annual salary of the employee.

      - name: quit_date
        description: This is the date when the employee left the company.

      - name: tenure_days
        description: This is the number of days the employee worked.

  - name: dim_client
    description: This table contains client information.
    columns:
      - name: client_id
        description: This is the unique id of the client.
        tests:
          # - unique
          - not_null

      - name: client_name
        description: This is the name of the client.

      - name: os
        description: This is the operating system used by the client.

      - name: ip
        description: This is the IP address of the client.

      - name: state
        description: This is the state of the client.


  - name: fact_sessions
    description: This table contains one row per website session and summarizes user behavior.
    columns:
      - name: session_id
        description: This is the unique id of the session.
        tests:
          - unique
          - not_null

      - name: client_id
        description: This is the id of the client for the session.

      - name: session_ts
        description: This is the timestamp when the session started.

      - name: viewed_shop_plants
        description: This indicates whether the user viewed shop plants.

      - name: viewed_item
        description: This indicates whether the user viewed an item.

      - name: added_to_cart
        description: This indicates whether the user added an item to the cart.

      - name: purchased
        description: This indicates whether the user made a purchase.

      - name: session_stage
        description: This is the final stage of the session (e.g. bounce, cart, purchased).


  - name: dim_item
    description: This table contains one row per item sold on the website.
    columns:
      - name: item_id
        description: This is the unique id of the item.
        tests:
          - unique
          - not_null

      - name: item_name
        description: This is the name of the item.

      - name: price_per_unit
        description: This is the price of the item per unit.


  - name: fact_order
    description: This table contains one row per order and summarizes order details.
    columns:
      - name: order_id
        description: This is the unique id of the order.
        tests:
          - unique
          - not_null

      - name: session_id
        description: This is the session id associated with the order.

      - name: client_name
        description: This is the name of the client who placed the order.

      - name: order_ts
        description: This is the timestamp when the order was placed.

      - name: order_date
        description: This is the date when the order was placed.

      - name: payment_method
        description: This is the payment method used for the order.

      - name: shipping_cost
        description: This is the shipping cost of the order.

      - name: tax_rate
        description: This is the tax rate applied to the order.

      - name: state
        description: This is the state where the order was placed.

      - name: returned_at
        description: This is the timestamp when the order was returned.

      - name: has_returned_flag
        description: This indicates whether the order was returned.

      - name: is_refunded
        description: This indicates whether the order was refunded.

      - name: return_days_after_order
        description: This is the number of days between order and return.




  - name: daily_finances
    description: >
      Final finance table aggregated at the daily level. 
      It combines revenue components from orders and item views
      with expense components from Google expense records.
      The table calculates gross revenue, net revenue, and profit.

    columns:

      - name: finance_date
        description: Date of the financial activity.
        tests:
          - unique
          - not_null

      - name: item_revenue
        description: Revenue generated from items sold.

      - name: shipping_revenue
        description: Shipping fees collected from customers.

      - name: tax_amount
        description: Tax amount calculated from item revenue using the tax rate.

      - name: gross_revenue
        description: Total revenue before refunds (item + shipping + tax).

      - name: net_revenue
        description: Revenue after subtracting refunded revenue.

      - name: refunded_revenue
        description: Total revenue refunded for orders that were refunded.

      - name: order_count
        description: Number of orders placed on that day.

      - name: refunded_order_count
        description: Number of orders that were refunded.

      - name: hr_expense
        description: HR related expenses recorded for the day.

      - name: tech_tool_expense
        description: Technology tool related expenses.

      - name: warehouse_expense
        description: Warehouse operation expenses.

      - name: other_expense
        description: Miscellaneous expenses not categorized elsewhere.

      - name: total_expense
        description: Total expenses recorded for the day.

      - name: profit
        description: Net revenue minus total expenses.

      - name: avg_order_value
        description: Average revenue per order for the day.