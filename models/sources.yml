version: 2

sources:
  - name: google_drive
    database: LOAD
    schema: GOOGLE_DRIVE
    tables:

      - name: EXPENSES
        config:
          freshness:
            warn_after: {count: 1, period: day}
            error_after: {count: 5, period: day}
          loaded_at_field: _fivetran_synced
      - name: HR_JOINS
      - name: HR_QUITS
      - name: RETURNS
      
  - name: web_schema
    database: LOAD
    schema: WEB_SCHEMA
    tables:
      
      - name: SESSIONS
      - name: ORDERS
      - name: PAGE_VIEWS
      - name: ITEM_VIEWS


